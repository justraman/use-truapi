name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bunx nx run-many -t build

      - name: Typecheck
        run: bunx nx run-many -t typecheck

      - name: Lint
        run: bunx nx run-many -t lint

      - name: Unit tests
        run: bunx nx run-many -t test

  e2e:
    name: E2E (host-api-test-sdk)
    runs-on: ubuntu-latest
    # Talks to live Paseo RPC through the test host; advisory, not a merge gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages and examples
        run: bunx nx run-many -t build

      - name: Install Playwright browsers
        run: cd e2e && bunx playwright install --with-deps chromium

      - name: Run e2e
        run: cd e2e && bunx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
