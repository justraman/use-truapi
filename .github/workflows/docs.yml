name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; don't cancel a deploy already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Enables Pages on first run and exposes base_path ("/<repo>" for
      # project sites, "" once a custom domain is configured).
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # The typedoc step resolves @use-truapi/core through package entry
      # points, so library dists must exist before the docs build.
      - name: Build packages
        run: bunx nx run-many -t build -p @use-truapi/core @use-truapi/react @use-truapi/vue

      - name: Build docs (static export)
        working-directory: apps/docs
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: bun run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
